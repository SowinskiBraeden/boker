{% extends "base.html" %}
{% block title %}Reset Password · myboker.org{% endblock %}
{% block content %}

<div class="form-shell narrow">
    <form class="panel form-card" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <p class="eyebrow">Account recovery</p>
            <h1 style="font-size:28px;margin-bottom:8px;">Reset password</h1>
            <p class="muted-text" style="margin-bottom:8px;">Enter a new password for your account.</p>
        </div>
        <label>
            <span>New password</span>
            <input type="password" name="new_password" autocomplete="new-password" minlength="8" required>
        </label>
        <label>
            <span>Confirm new password</span>
            <input type="password" name="confirm_password" autocomplete="new-password" minlength="8" required>
        </label>
        <button class="btn btn--primary" type="submit">Reset password</button>
    </form>
</div>

{% endblock %}
